<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>e-Defter Berat Goruntuleyici</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Segoe UI,Arial,sans-serif;background:linear-gradient(180deg,#f6f8fb 0%,#eef3f8 100%);color:#111;padding:24px}
.container{max-width:920px;margin:0 auto}
h1{font-size:22px;font-weight:700;margin-bottom:8px;color:#1f2a37;letter-spacing:.01em}
.sub{font-size:13px;color:#667085;margin-bottom:20px}
.dz{border:2px dashed #b8c6d8;border-radius:16px;padding:40px 18px;text-align:center;cursor:pointer;background:linear-gradient(180deg,#ffffff 0%,#f8fbff 100%);transition:all .2s;box-shadow:0 10px 30px rgba(18,38,63,.06)}
.dz:hover,.dz.over{border-color:#6f86a5;background:#fafdff;box-shadow:0 14px 34px rgba(18,38,63,.09)}
.dtxt{font-size:15px;font-weight:500;margin-bottom:6px}
.dsub{font-size:13px;color:#888}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 18px;border:1px solid #1e3a5f;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;background:#243b53;color:#fff;margin-top:14px;box-shadow:0 6px 18px rgba(36,59,83,.15);transition:all .2s}
.btn:hover{background:#1d3147;border-color:#1d3147}
.btn-sm{padding:9px 14px;font-size:12px;margin-top:0;border-radius:999px}
.err{background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:10px 14px;font-size:13px;color:#7f1d1d;margin-top:12px;display:none}
.tabs{display:flex;gap:8px;border-bottom:1px solid #d8e0ea;margin-bottom:16px;padding-bottom:8px}
.tab{padding:10px 16px;font-size:13px;cursor:pointer;color:#667085;border:1px solid transparent;border-radius:999px;background:transparent;font-weight:600}
.tab:hover{background:#f3f6fb;color:#344054}
.tab.active{color:#1d2939;border-color:#d2dbe8;background:#eef4fb;font-weight:700}
.pnl{display:none}
.pnl.active{display:block}
.result{display:none;background:#fff;border-radius:18px;padding:20px;border:1px solid #dde5ef;box-shadow:0 16px 40px rgba(15,23,42,.08)}
.tb{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;padding:12px 14px;border:1px solid #e6ebf2;border-radius:14px;background:#f8fafc}
.fn{font-size:13px;font-weight:700;color:#334155;word-break:break-all}
.rst{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:#435067;cursor:pointer;background:#f3f6fb;border:1px solid #d6deea;border-radius:999px;padding:8px 14px;margin-bottom:12px;transition:background .2s,border-color .2s,color .2s;box-shadow:0 1px 2px rgba(16,24,40,.05)}
.rst:hover{background:#eaf0f8;border-color:#bfcddd;color:#273243}
.rst:before{content:"<";font-size:12px;line-height:1}
.tip{font-size:11px;color:#aaa;margin-top:10px}
.outer{border:5px solid #969696;padding:5px;font-family:"Arial Narrow",Arial,sans-serif;font-size:9.5pt}
.inner{border:10px solid #1e1e1e;padding:16px}
.bh1{font-size:16px;text-align:center;margin:6px 0 16px;font-weight:bold}
.baslik{text-align:center;margin:10px 0 4px;position:relative}
.baslik hr{border:none;border-top:1px solid #bbb;margin:0}
.btext{display:inline-block;background:#fff;font-size:10.5pt;font-weight:bold;margin-top:-12px;padding:0 10px;position:relative}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.bt{border-collapse:collapse;width:100%}
.bt th{font-weight:bold;text-align:right;white-space:nowrap;padding:2px 6px 2px 0;font-size:9pt;vertical-align:top}
.bt td{padding:2px 4px;font-size:9pt;vertical-align:top}
.sep{text-align:center;padding:0 3px;width:10px}
.det{border-collapse:collapse;width:100%;margin-bottom:20px;font-size:9pt}
.det th,.det td{border:1px solid #000;padding:4px 6px;text-align:center}
.det th{background:#f0f0f0;font-weight:bold}
.det td.L{text-align:left}
.det td.R{text-align:right}
.box{border:1px solid #aca899;padding:5px;word-break:break-all;font-size:7.5pt;font-family:monospace;line-height:1.4;margin-bottom:8px}
.sec{background:#fafafa;border:1px solid #eee;border-radius:10px;padding:14px 18px;margin-bottom:10px}
.sec-t{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.05em;padding-bottom:8px;border-bottom:1px solid #eee;margin-bottom:10px}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ic{background:#fff;border:1px solid #eee;border-radius:8px;padding:9px 12px}
.il{font-size:11px;color:#aaa;margin-bottom:3px}
.iv{font-size:13px;font-weight:500;color:#111;word-break:break-all;line-height:1.4}
.iv.mo{font-family:monospace;font-size:10px;line-height:1.6;color:#555}
.badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500}
.b-ok{background:#f0fdf4;color:#166534}
.b-warn{background:#fffbeb;color:#92400e}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.dot-ok{background:#22c55e}
.dot-warn{background:#f59e0b}
.fc{grid-column:1/-1}
.berat-logo{max-width:165px;height:auto;margin:0 auto 20px;display:block}
@media (max-width:700px){body{padding:14px}.tb{flex-direction:column;align-items:stretch}.tabs{flex-wrap:wrap}.tab{flex:1 1 auto;text-align:center}.result{padding:14px}}
@page{size:auto;margin:10mm}
@media print{
body{background:#fff;padding:0}
.container{max-width:100%}
#res,.result{display:block!important;border:none;padding:0;background:#fff}
#pnl-resmi,.pnl.active{display:block!important}
#beratDiv{display:block!important}
.tabs,.tb,.rst,.err,#pnl-ozet,.container>h1,.container>.sub,.dz{display:none!important}
.outer,.inner,.det,.box,.two-col,.baslik{break-inside:avoid;page-break-inside:avoid}
img{print-color-adjust:exact;-webkit-print-color-adjust:exact}
}
</style>
</head>
<body>
<div class="container">
<h1>e-Defter Berat Goruntuleyici</h1>
<p class="sub">GIB resmi formatinda berat XML dosyanizi goruntuleyin. Kurulum gerekmez.</p>

<div class="dz" id="dz">
<div class="dtxt">Berat XML dosyasini buraya surukleyin</div>
<div class="dsub">veya bilgisayarinizdan secin</div>
<button class="btn" onclick="document.getElementById('fi').click()">Dosya sec</button>
<input type="file" id="fi" accept=".xml" style="display:none">
<p class="tip">Desteklenen format: GIB e-Defter berat XML (.xml)</p>
</div>

<div class="err" id="eb"></div>

<div class="result" id="res">
<button class="rst" onclick="resetUI()">Yeni dosya yukle</button>
<div class="tabs">
<button class="tab active" onclick="stab(this,'resmi')">Resmi Gorunum</button>
<button class="tab" onclick="stab(this,'ozet')">Ozet ve Dogrulama</button>
</div>
<div id="pnl-resmi" class="pnl active">
<div class="tb">
<span class="fn" id="fn"></span>
<button class="btn btn-sm" onclick="window.print()">Yazdir / PDF Kaydet</button>
</div>
<div id="beratDiv"></div>
</div>
<div id="pnl-ozet" class="pnl">
<div id="oz"></div>
</div>
</div>
</div>

function showErr(m) { eb.textContent = m; eb.style.display = "block"; }

function stab(el, n) {
  var tabs = document.querySelectorAll(".tab");
  var pnls = document.querySelectorAll(".pnl");
  var i;
  for (i = 0; i < tabs.length; i++) tabs[i].classList.remove("active");
  for (i = 0; i < pnls.length; i++) pnls[i].classList.remove("active");
  el.classList.add("active");
  document.getElementById("pnl-" + n).classList.add("active");
}
function go(f) {
  eb.style.display = "none";
  if (!/\.xml$/i.test(f.name)) { showErr("Lutfen .xml uzantili berat dosyasi yukleyin."); return; }
  var r = new FileReader();
  r.onload = function(e) { process(e.target.result, f.name); };
  r.readAsText(f, "UTF-8");
}
function gn(doc, ln) {
  var all = doc.querySelectorAll("*");
  var out = [];
  var i;
  for (i = 0; i < all.length; i++) {
    if (all[i].localName === ln) {
      var t = all[i].textContent.trim();
      if (t) out.push(t);
    }
  }
  return out;
}
function gAttr(doc, ln, attr, val) {
  var all = doc.querySelectorAll("*");
  var i;
  for (i = 0; i < all.length; i++) {
    if (all[i].localName === ln && all[i].getAttribute(attr) === val) return all[i].textContent.trim();
  }
  return "";
}
function gDesc(doc, desc) {
  var all = doc.querySelectorAll("*");
  var i;
  for (i = 0; i < all.length; i++) {
    if (all[i].localName === "organizationDescription" && all[i].textContent.trim() === desc) {
      var p = all[i].parentElement;
      var kids;
      var j;
      if (p) {
        kids = p.querySelectorAll("*");
        for (j = 0; j < kids.length; j++) {
          if (kids[j].localName === "organizationIdentifier") return kids[j].textContent.trim();
        }
      }
    }
  }
  return "";
}
function fmtDate(s) {
  if (!s || s.length < 10) return s || "";
  return s.substring(8,10) + " / " + s.substring(5,7) + " / " + s.substring(0,4);
}
function fmtNum(s) {
  var n = parseFloat(s);
  if (isNaN(n)) return "0,00";
  return n.toLocaleString("tr-TR", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function esc(s) {
  return (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}
function nestedText(root, localName) {
  var all = root.querySelectorAll("*");
  var i;
  for (i = 0; i < all.length; i++) {
    if (all[i].localName === localName) return all[i].textContent.trim();
  }
  return "";
}
function collectEntryDetail(el, dEntries) {
  var include = "";
  var dc = "";
  var accId = "";
  var accDesc = "";
  var amt = "";
  var kids = el.children;
  var j;
  var m;
  for (j = 0; j < kids.length; j++) {
    var k = kids[j];
    if (k.localName === "debitCreditCode") dc = k.textContent.trim();
    if (k.localName === "amount") amt = k.textContent.trim();
    if (k.localName === "account") {
      var ak = k.children;
      for (m = 0; m < ak.length; m++) {
        if (ak[m].localName === "accountMainID") accId = ak[m].textContent.trim();
        if (ak[m].localName === "accountMainDescription") accDesc = ak[m].textContent.trim();
      }
    }
    if (k.localName === "xbrlInfo") {
      var xk = k.children;
      for (m = 0; m < xk.length; m++) {
        if (xk[m].localName === "xbrlInclude") include = xk[m].textContent.trim();
      }
    }
  }
  if (include === "period_change" && accId) {
    if (!dEntries[accId]) dEntries[accId] = { desc: accDesc, D: "0", C: "0" };
    if (dc === "D") dEntries[accId].D = amt || "0";
    if (dc === "C") dEntries[accId].C = amt || "0";
    if (accDesc) dEntries[accId].desc = accDesc;
  }
}

}

  h += "</div>";
  h += "<div class=\"sec\"><div class=\"sec-t\">Mukellef ve Meslek Mensubu</div><div class=\"igrid\">" + card("VKN", vkn) + card("Unvan", unvan) + card("Meslek mensubu", acc) + card("Sozlesme", soz) + "</div></div>";
  h += "<div class=\"sec\"><div class=\"sec-t\">Defter Bilgileri</div><div class=\"igrid\">" + card("Dokuman tipi", tipTr) + card("Yevmiye mad. sayisi", yev) + card("Donem", pb && pe ? pb + " - " + pe : "") + card("Olusturma tarihi", creation ? creation.substring(0,10) : "") + card("Tekil no", tekil) + card("Kaynak uygulama", srcApp) + (comment ? card("Aciklama", comment, false, true) : "") + "</div></div>";
  if (allD && allD.length) {
    var i;
    h += "<div class=\"sec\"><div class=\"sec-t\">Ozet Degerleri - " + allD.length + " adet</div>";
    for (i = 0; i < allD.length; i++) {
      h += "<div style=\"margin-bottom:6px\"><div class=\"il\">Hash " + (i + 1) + "</div><div class=\"iv mo\">" + esc(allD[i]) + "</div></div>";
    }
    h += "</div>";
  }
  document.getElementById("oz").innerHTML = h;
}
function process(xmlStr, fname) {
  try {
    var p = new DOMParser();
    var doc = p.parseFromString(xmlStr, "text/xml");
    if (doc.querySelector("parsererror")) { showErr("XML okunamadi. Dosya bozuk olabilir."); return; }

    var vkn = gAttr(doc, "identifier", "scheme", "http://www.gib.gov.tr");
    var unvan = gDesc(doc, "Kurum Unvan\u0131") || gDesc(doc, "Kurum Unvani");
    var sube = gDesc(doc, "\u015eube Ad\u0131") || gDesc(doc, "Sube Adi");
    var adi = gDesc(doc, "Ad\u0131 Soyad\u0131") || gDesc(doc, "Adi Soyadi");
    var isKurum = !!unvan;
    var unvanGoster = unvan || adi;
    var accName = gn(doc, "accountantName")[0] || "";
    var accPhone = gn(doc, "accountantContactPhoneNumber")[0] || "";
    var accFax = gn(doc, "accountantContactFaxNumber")[0] || "";
    var accEmail = gn(doc, "accountantContactEmailAddress")[0] || "";
    var accSoz = gn(doc, "accountantEngagementTypeDescription")[0] || "";
    var entPhone = gn(doc, "phoneNumber")[0] || "";
    var entFax = gn(doc, "entityFaxNumber")[0] || "";
    var entEmail = gn(doc, "entityEmailAddress")[0] || "";
    var entType = gn(doc, "entriesType")[0] || "";
    var entTypeStr = entType === "journal" ? "Yevmiye Defteri" : entType === "ledger" ? "Buyuk Defter" : "Berat (Defter Raporu)";
    var creator = gn(doc, "creator")[0] || "";
    var pb = gn(doc, "periodCoveredStart")[0] || "";
    var pe = gn(doc, "periodCoveredEnd")[0] || "";
    var creation = gn(doc, "creationDate")[0] || "";
    var tekil = gn(doc, "uniqueID")[0] || "";
    var srcApp = gn(doc, "sourceApplication")[0] || "";
    var fyStart = gn(doc, "fiscalYearStart")[0] || "";
    var fyEnd = gn(doc, "fiscalYearEnd")[0] || "";
    var ettn = gn(doc, "uniqueID")[1] || tekil;
    var yev = gn(doc, "numberOfEntries")[0] || "";
    var comment = gn(doc, "entriesComment")[0] || "";

    var dEntries = {};
    var allEls = doc.querySelectorAll("*");
    var i;
    for (i = 0; i < allEls.length; i++) {
      if (allEls[i].localName === "entryDetail") collectEntryDetail(allEls[i], dEntries);
    }

    var keys = Object.keys(dEntries).sort();
    var detayRows = "";
    for (i = 0; i < keys.length; i++) {
      var key = keys[i];
      var row = dEntries[key];
      detayRows += "<tr><td>" + esc(key) + "</td><td class=\"L\">" + esc(row.desc) + "</td><td class=\"R\">" + fmtNum(row.D) + "</td><td class=\"R\">" + fmtNum(row.C) + "</td></tr>";
    }

    var digests = gn(doc, "DigestValue");
    var digestGoster = digests.length > 1 ? digests[1] : (digests[0] || "");
    var sigVal = gn(doc, "SignatureValue")[0] || "";
    var counterSig = "";
    for (i = 0; i < allEls.length; i++) {
      if (allEls[i].localName === "CounterSignature") {
        counterSig = nestedText(allEls[i], "SignatureValue");
        break;
      }
    }

    document.getElementById("fn").textContent = fname;
    document.getElementById("beratDiv").innerHTML = buildResmiHtml({
      isKurum: isKurum,
      vkn: vkn,
      sube: sube,
      unvanGoster: unvanGoster,
      entPhone: entPhone,
      entFax: entFax,
      entEmail: entEmail,
      accName: accName,
      accPhone: accPhone,
      accFax: accFax,
      accEmail: accEmail,
      accSoz: accSoz,
      entTypeStr: entTypeStr,
      creator: creator,
      pb: pb,
      pe: pe,
      creation: creation,
      tekil: tekil,
      srcApp: srcApp,
      fyStart: fyStart,
      fyEnd: fyEnd,
      ettn: ettn,
      yev: yev,
      comment: comment,
      detayRows: detayRows,
      digestGoster: digestGoster,
      sigVal: sigVal,
      counterSig: counterSig
    });
    buildOzet(doc, vkn, unvanGoster, entTypeStr, pb, pe, creation, tekil, srcApp, accName, accSoz, yev, comment, digests, counterSig);
    dz.style.display = "none";
    res.style.display = "block";
  } catch (ex) {
    showErr("Hata: " + ex.message);
  }
}
</script>
